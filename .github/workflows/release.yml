name: Build & Release

on:
  push:
    tags:
      - 'v*' # Dispara a compilação ao criar uma tag (ex: v1.0.0)
  workflow_dispatch: # Permite disparar a compilação manualmente no painel do GitHub

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin' # Compila para Intel e Apple Silicon (M1/M2/M3)
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm ci # Usa npm ci para instalar exatamente o que está no package-lock.json

      - name: Build and Package Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # Cria um rascunho de release com a versão do package.json
          releaseName: 'Catarse Central v__VERSION__'
          releaseBody: 'Instaladores oficiais de produção gerados automaticamente.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
